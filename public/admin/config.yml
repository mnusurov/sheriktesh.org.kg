local_backend: true

backend:
  name: github
  repo: mnusurov/sheriktesh.org.kg
  branch: main
  base_url: https://www.sheriktesh.org.kg
  auth_endpoint: /api/auth

i18n:
  structure: multiple_folders
  locales: [ru, en]
  default_locale: ru

media_folder: public/assets
public_folder: /assets

collections:
  - name: news
    label: News
    label_singular: News item
    folder: src/content/news
    i18n: true
    create: true
    delete: true
    fields:
      - { label: Title, name: title, widget: string, i18n: true }
      - { label: Lang, name: lang, widget: select, options: [ru, en], i18n: false }
      - { label: Date, name: date, widget: datetime, i18n: false }
      - { label: Image, name: image, widget: image, required: false, i18n: false }
      - { label: "Card summary (shown on the News page; falls back to an auto-excerpt of Body if left blank)", name: description, widget: text, required: false, i18n: true }
      - { label: Author, name: author, widget: string, required: false, i18n: true }
      - { label: Body, name: body, widget: markdown, i18n: true }

  - name: programs
    label: Programs
    label_singular: Program
    folder: src/content/programs
    i18n: true
    create: true
    delete: true
    fields:
      - { label: Title, name: title, widget: string, i18n: true }
      - { label: Lang, name: lang, widget: select, options: [ru, en], i18n: false }
      - { label: Order, name: order, widget: number, i18n: false }
      - { label: "Card summary (shown on the Programs page; falls back to an auto-excerpt of Body if left blank)", name: description, widget: text, required: false, i18n: true }
      - { label: Body, name: body, widget: markdown, i18n: true }

  - name: documents
    label: Documents
    label_singular: Document set
    folder: src/content/documents
    i18n: true
    create: true
    delete: true
    fields:
      - { label: Title, name: title, widget: string, i18n: true }
      - { label: Lang, name: lang, widget: select, options: [ru, en], i18n: false }
      - { label: Category, name: category, widget: select, options: [conventions, manuals, publications], i18n: false }
      - label: Docs
        name: docs
        widget: list
        i18n: false
        fields:
          - { label: PDF file, name: pdf, widget: file }
          - { label: Cover image, name: cover, widget: image, required: false }
          - { label: Description, name: description, widget: text, i18n: true }

  - name: galleries
    label: Galleries
    label_singular: Gallery
    folder: src/content/galleries
    i18n: true
    create: true
    delete: true
    fields:
      - { label: Title, name: title, widget: string, i18n: true }
      - { label: Lang, name: lang, widget: select, options: [ru, en], i18n: false }
      - { label: Order, name: order, widget: number, i18n: false }
      - { label: Date, name: date, widget: datetime, required: false, i18n: false }
      - { label: Images, name: images, widget: list, field: { label: Image, name: image, widget: image }, i18n: false }

  - name: partners
    label: Партнёры
    label_singular: Партнёр
    folder: src/content/partners
    i18n: true
    create: true
    delete: true
    fields:
      - { label: Заголовок, name: title, widget: string, i18n: true }
      - { label: Язык, name: lang, widget: select, options: [ru, en], i18n: false }
      - { label: Содержание, name: body, widget: markdown, i18n: true }

  - name: about
    label: О нас
    label_singular: Запись
    folder: src/content/about
    i18n: true
    create: true
    delete: true
    fields:
      - { label: Заголовок, name: title, widget: string, i18n: true }
      - { label: Язык, name: lang, widget: select, options: [ru, en], i18n: false }
      - { label: Содержание, name: body, widget: markdown, i18n: true }

  - name: contact
    label: Контакты
    label_singular: Контакт
    folder: src/content/contact
    i18n: true
    create: true
    delete: true
    fields:
      - { label: Заголовок, name: title, widget: string, i18n: true }
      - { label: Язык, name: lang, widget: select, options: [ru, en], i18n: false }
      - { label: Содержание, name: body, widget: markdown, i18n: true }

  - name: staff
    label: Штат
    label_singular: Сотрудник
    folder: src/content/staff
    i18n: true
    create: true
    delete: true
    fields:
      - { label: Имя, name: title, widget: string, i18n: true }
      - { label: Язык, name: lang, widget: select, options: [ru, en], i18n: false }
      - { label: Должность, name: role, widget: string, i18n: true }
      - { label: Фото, name: photo, widget: image, i18n: false }
      - { label: Порядок, name: order, widget: number, i18n: false }

  - name: homepage
    label: Главная
    label_singular: Блок
    folder: src/content/homepage
    i18n: true
    create: true
    delete: true
    fields:
      - { label: Тип блока, name: block_type, widget: select, options: [hero, about, history, activities], i18n: false }
      - { label: Заголовок, name: title, widget: string, i18n: true }
      - { label: Язык, name: lang, widget: select, options: [ru, en], i18n: false }
      - { label: Порядок, name: order, widget: number, i18n: false }
      - { label: Содержание, name: body, widget: markdown, i18n: true }
